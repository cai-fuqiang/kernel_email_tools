# kernel_email_tools 统一配置文件

# 邮件数据源配置
email_collector:
  type: git
  base_url: https://lore.kernel.org
  data_dir: ~/workspace/kernel_email     # 远端服务器已有仓库路径
  default_lists:
    - linux-mm
  # 本地多 channel 配置（从本地目录采集）
  local_channels:
    - name: kvm        # channel 名称，对应 list_name
      path: ~/workspace/kernel_email/kvm
    - name: linux-mm
      path: ~/workspace/kernel_email/linux-mm
    - name: lkml
      path: ~/workspace/kernel_email/lkml

email_parser:
  max_body_length: 100000                # 正文最大字符数
  patch_separator: "---"                 # patch 分隔标识

# 芯片手册数据源配置
manual_collector:
  manuals_dir: ./manuals                 # 手册 PDF 存放根目录
  sources:
    intel_sdm:
      type: pdf
      path: ./manuals/intel_sdm/
      url: https://cdrdv2.intel.com/v1/dl/getContent/325462  # 合集 PDF

manual_parser:
  pdf_engine: pymupdf                    # pymupdf | pdfplumber
  max_page_text_length: 50000            # 单页文本最大字符数

# 文档分片配置
chunker:
  target_tokens: 512                     # L2 段落目标 token 数
  max_tokens: 1024                       # L3 过长阈值
  min_tokens: 128                        # L3 过短阈值
  overlap_ratio: 0.2                     # L3 滑动窗口重叠比例
  token_model: cl100k_base               # tiktoken 编码模型

# 存储配置（支持多数据库）
storage:
  email:
    type: postgres
    database_url: postgresql+asyncpg://kernel:kernel@localhost:5432/kernel_email
    pool_size: 5
  manual:
    type: postgres
    database_url: postgresql+asyncpg://kernel:kernel@localhost:5432/chip_manual_kb
    pool_size: 5

# 索引配置
indexer:
  fulltext:
    enabled: true
    language: english
  vector:
    enabled: false                       # Phase 2 开启
    model: text-embedding-3-small
    dimension: 1536

# 检索配置
retriever:
  default_mode: hybrid                   # keyword | semantic | hybrid
  keyword_page_size: 50
  semantic_top_k: 20

# 翻译配置
translator:
  provider: google                      # google | deepl | llm
  # Google Translate API 配置
  google:
    api_url: https://translate.googleapis.com/translate_a/single
    timeout: 10
  # 代理配置（用于访问 Google Translate）
  proxy:
    enabled: true
    http: http://127.0.0.1:7897        # HTTP 代理地址
    https: http://127.0.0.1:7897         # HTTPS 代理地址
  # 其他翻译服务配置
  deepl:
    api_key: ""
  llm_model: gpt-4
  cache_enabled: true
  glossary_path: ./config/glossary.yaml

# 问答配置
qa:
  email:
    llm_provider: dashscope              # openai | anthropic | dashscope | minimax
    model: qwen-plus-2025-07-28          # 千问模型
    api_key: "sk-ae19a6f47bf94122ae253ded970a6b9d"                          # API Key
  manual:
    llm_provider: openai
    model: gpt-4
    api_key: ""                          # API Key

# 批注配置
annotations:
  default_author: "me"                   # 默认批注作者名称
