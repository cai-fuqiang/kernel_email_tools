# kernel_email_tools 配置文件

collector:
  type: git
  base_url: https://lore.kernel.org
  data_dir: ~/workspace/kernel_email     # 远端服务器已有仓库路径
  default_lists:
    - linux-mm

parser:
  max_body_length: 100000                # 正文最大字符数
  patch_separator: "---"                 # patch 分隔标识

storage:
  type: postgres
  database_url: postgresql+asyncpg://kernel:kernel@localhost:5432/kernel_email
  pool_size: 5

indexer:
  fulltext:
    enabled: true
    language: english
  vector:
    enabled: false                       # MVP 阶段先关闭，Phase 2 开启
    model: text-embedding-3-small
    dimension: 1536

retriever:
  default_mode: hybrid                   # keyword | semantic | hybrid
  keyword_page_size: 50
  semantic_top_k: 20

qa:
  llm_provider: dashscope              # openai | anthropic | dashscope | minimax
  model: qwen-plus-2025-07-28                 # 千问模型: qwen-plus, qwen-turbo, qwen-max
  api_key: ""                           # API Key（环境变量优先，配置次之）
