# kernel_email_tools 统一配置文件

# 邮件数据源配置
email_collector:
  type: git
  base_url: https://lore.kernel.org
  data_dir: ~/workspace/kernel_email     # 远端服务器已有仓库路径
  default_lists:
    - linux-mm
  # 本地多 channel 配置（从本地目录采集）
  local_channels:
    - name: kvm        # channel 名称，对应 list_name
      path: ~/workspace/kernel_email/kvm
    - name: linux-mm
      path: ~/workspace/kernel_email/linux-mm
    - name: lkml
      path: ~/workspace/kernel_email/lkml

email_parser:
  max_body_length: 100000                # 正文最大字符数
  patch_separator: "---"                 # patch 分隔标识

# 芯片手册数据源配置
manual_collector:
  manuals_dir: ./manuals                 # 手册 PDF 存放根目录
  sources:
    intel_sdm:
      type: pdf
      path: ./manuals/intel_sdm/
      url: https://cdrdv2.intel.com/v1/dl/getContent/325462  # 合集 PDF

manual_parser:
  pdf_engine: pymupdf                    # pymupdf | pdfplumber
  max_page_text_length: 50000            # 单页文本最大字符数

# 文档分片配置
chunker:
  target_tokens: 512                     # L2 段落目标 token 数
  max_tokens: 1024                       # L3 过长阈值
  min_tokens: 128                        # L3 过短阈值
  overlap_ratio: 0.2                     # L3 滑动窗口重叠比例
  token_model: cl100k_base               # tiktoken 编码模型

# 存储配置（支持多数据库）
storage:
  email:
    type: postgres
    database_url: postgresql+asyncpg://kernel:kernel@localhost:5432/kernel_email
    pool_size: 5
  manual:
    type: postgres
    database_url: postgresql+asyncpg://kernel:kernel@localhost:5432/chip_manual_kb
    pool_size: 5
  # 代码注释存储（使用云数据库，支持远端备份）
  # 推荐 Neon: https://neon.tech (免费 500MB，适合注释文本)
  code_annotation:
    type: postgres
    # TODO: 替换为你自己的 Neon 连接串（从 Neon 控制台获取）
    # 格式: postgresql+asyncpg://user:password@host/dbname
    ## postgresql+asyncpg://neondb_owner:npg_Ec4bSNkhvdj7@ep-round-term-amz81fpj.c-5.us-east-1.aws.neon.tech/neondb
    database_url: postgresql+asyncpg://kernel:kernel@localhost:5432/kernel_code
    pool_size: 2

# 索引配置
indexer:
  fulltext:
    enabled: true
    language: english
  vector:
    enabled: true
    provider: dashscope                  # dashscope | local
    model: text-embedding-v3             # dashscope: text-embedding-v3, local: BAAI/bge-m3 / all-MiniLM-L6-v2 等
    dimension: 1024                      # 向量维度
    batch_size: 8                        # DashScope 上限 10, 本地可调大
    api_key: ""                          # 默认复用 qa.email.api_key，也可用 DASHSCOPE_API_KEY

# 检索配置
retriever:
  default_mode: hybrid                   # keyword | semantic | hybrid
  keyword_page_size: 50
  semantic_top_k: 20

# 翻译配置
translator:
  provider: google                      # google | deepl | llm
  # Google Translate API 配置
  google:
    api_url: https://translate.googleapis.com/translate_a/single
    timeout: 10
  # 代理配置（用于访问 Google Translate）
  proxy:
    enabled: true
    http: http://127.0.0.1:7897        # HTTP 代理地址
    https: http://127.0.0.1:7897         # HTTPS 代理地址
  # 其他翻译服务配置
  deepl:
    api_key: ""
  llm_model: gpt-4
  cache_enabled: true
  glossary_path: ./config/glossary.yaml

# 问答配置
qa:
  email:
    llm_provider: dashscope              # openai | anthropic | dashscope | minimax
    model: qwen3-coder-plus          # 千问模型
    api_key: "sk-ca0369a956e64f92b275ac1b890d88fe"                          # API Key, set DASHSCOPE_API_KEY env var
  manual:
    llm_provider: openai
    model: gpt-4
    api_key: ""                          # API Key

# 批注配置
annotations:
  default_author: "me"                   # 默认批注作者名称

# 多用户认证配置
auth:
  mode: header
  allow_auto_provision: true
  local:
    enabled: true
    session_cookie_name: kernel_email_session
    session_ttl_hours: 168
    pbkdf2_iterations: 240000
    allow_public_registration: true
    require_admin_approval: true
    allow_header_auth_fallback: true
    cookie_secure: false
    bootstrap_admin:
      username: admin
      password: ""                         # Set KERNEL_ADMIN_PASSWORD env var
      display_name: System Admin
      email: admin@example.com
  headers:
    user_id: X-User-Id
    username: X-Username
    display_name: X-Display-Name
    email: X-User-Email
    role: X-User-Role
  dev_fallback_user:
    enabled: false
    user_id: dev-admin
    username: dev-admin
    display_name: Dev Admin
    email: dev@example.com
    role: admin
    status: active

# 内核源码浏览配置（PLAN-10000）
kernel_source:
  # 主仓库路径（指向 .git 目录，因为 GitLocalSource 使用 --git-dir）
  repo_path: /home/wang/workspace/kernel/linux-stable/.git
  # 历史仓库路径（history/history.git，覆盖 v0.01 ~ v2.6.11）
  history_repo_path: /home/wang/workspace/kernel/history/.git
  # 是否启用 graft 接合（将 history 接入 master 仓库）
  graft_enabled: true
  # 版本过滤：release 仅正式版（vX.Y），all 包含 rc
  version_filter: release
  # 大文件阈值（字节），超过此大小返回截断提示
  max_file_size: 1048576                 # 1MB
  # 内存缓存配置
  cache:
    tag_list_ttl: 3600                   # tag 列表缓存 TTL（秒）
    tree_cache_size: 256                 # 目录树 LRU 缓存条目数
    file_cache_size: 128                 # 文件内容 LRU 缓存条目数
